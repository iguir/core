name: Deploy docs

# Builds the VitePress site on every push to `main` and publishes it to the
# repository's GitHub Pages environment. Also runs on workflow_dispatch so
# maintainers can redeploy without a code change.
on:
    push:
        branches: [main]
        paths:
            - 'docs/**'
            - 'package.json'
            - 'bun.lock'
            - '.github/workflows/docs.yml'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Cancel in-progress runs when a newer commit lands.
concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0   # `lastUpdated` reads the git log

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - run: bun run docs:build

            - uses: actions/configure-pages@v5

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: docs/.vitepress/dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
